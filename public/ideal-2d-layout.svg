    <rect x="95" y="78" width="640" height="246" rx="12" class="dash"/>
    <text x="415" y="12" class="t b s">40 м</text><path d="M55 24h720M55 18v12M775 18v12" class="thin" fill="none"/>
    <text x="12" y="212" class="t b s" transform="rotate(-90 12 212)">30 м</text><path d="M28 38v330M22 38h12M22 368h12" class="thin" fill="none"/>
    <text x="122" y="86" fill="#8a6c35" font-family="Inter,Arial" font-size="13" font-weight="800">отступ 3 м</text>

    <rect x="72" y="210" width="720" height="4" fill="#b65a3c"/><text x="685" y="205" fill="#b65a3c" font-family="Inter,Arial" font-size="12">красная линия</text>
    <rect x="55" y="368" width="720" height="68" class="road"/>
    <g opacity=".5"> <rect x="55" y="368" width="14" height="68" class="road2"/><rect x="93" y="368" width="14" height="68" class="road2"/><rect x="131" y="368" width="14" height="68" class="road2"/><rect x="169" y="368" width="14" height="68" class="road2"/><rect x="207" y="368" width="14" height="68" class="road2"/><rect x="245" y="368" width="14" height="68" class="road2"/><rect x="283" y="368" width="14" height="68" class="road2"/><rect x="321" y="368" width="14" height="68" class="road2"/><rect x="359" y="368" width="14" height="68" class="road2"/><rect x="397" y="368" width="14" height="68" class="road2"/><rect x="435" y="368" width="14" height="68" class="road2"/><rect x="473" y="368" width="14" height="68" class="road2"/><rect x="511" y="368" width="14" height="68" class="road2"/><rect x="549" y="368" width="14" height="68" class="road2"/><rect x="587" y="368" width="14" height="68" class="road2"/><rect x="625" y="368" width="14" height="68" class="road2"/><rect x="663" y="368" width="14" height="68" class="road2"/><rect x="701" y="368" width="14" height="68" class="road2"/></g>
    <text x="335" y="410" class="t b" font-size="18">ПОДЪЕЗДНАЯ ДОРОГА</text>

    <rect x="235" y="170" width="245" height="118" rx="20" fill="#d8ad57" stroke="#9b7534" filter="url(#shadow)"/>
    <text x="315" y="218" class="t xl">ОБЪЕКТ</text><text x="348" y="247" class="t b s">18×10 м</text>
    <rect x="95" y="140" width="118" height="150" rx="20" fill="#cfe8c8" stroke="#9abe91"/><circle cx="125" cy="170" r="13" fill="#8fc586"/><circle cx="145" cy="202" r="11" fill="#8fc586"/><circle cx="128" cy="255" r="13" fill="#8fc586"/><text x="110" y="230" fill="#3d6539" font-family="Inter,Arial" font-size="13" font-weight="900">ОЗЕЛЕНЕНИЕ</text>
    <rect x="615" y="118" width="120" height="64" rx="14" fill="#e6e2d8" stroke="#aaa59a"/><text x="641" y="156" class="t b s">ТЕХ. ЗОНА</text>
    <rect x="615" y="200" width="120" height="112" rx="16" fill="#dce7ef" stroke="#7f9cb5"/><text x="661" y="246" fill="#24394f" font-family="Inter,Arial" font-size="38" font-weight="900">P</text><text x="647" y="276" fill="#24394f" font-family="Inter,Arial" font-size="13" font-weight="800">6 м/м</text><path d="M635 287v25M665 287v25M695 287v25" stroke="#8ba6bb"/>
    <path d="M480 230h135" stroke="#77736b" stroke-width="6"/><path d="M480 230h135" stroke="#fbfaf7" stroke-width="2"/><text x="500" y="220" class="caption">пешеходная связь</text>
    <rect x="205" y="330" width="100" height="48" rx="12" fill="#fff4e7" stroke="#c47b2b" stroke-width="3"/><text x="226" y="360" fill="#7a4011" font-family="Inter,Arial" font-size="15" font-weight="900">ВЪЕЗД</text>
    <circle cx="775" cy="58" r="24" fill="#fffdf8" stroke="#171916"/><text x="767" y="66" class="t b" font-size="18">N</text>
  </g>

  <g transform="translate(110 714)">
    <rect x="0" y="0" width="22" height="22" rx="4" fill="#d8ad57"/><text x="36" y="17" class="m s">объект</text>
    <rect x="135" y="0" width="22" height="22" rx="4" fill="#dce7ef"/><text x="171" y="17" class="m s">парковка</text>
    <rect x="295" y="0" width="22" height="22" rx="4" fill="#e6e2d8"/><text x="331" y="17" class="m s">техзона</text>
    <rect x="445" y="0" width="22" height="22" rx="4" fill="#cfe8c8"/><text x="481" y="17" class="m s">озеленение</text>
    <rect x="625" y="0" width="22" height="22" rx="4" fill="#fff4e7" stroke="#c47b2b"/><text x="661" y="17" class="m s">въезд</text>
  </g>

  <g transform="translate(1015 236)">
    <rect width="330" height="118" rx="16" fill="#fbfaf7" stroke="#ded8ca"/><text x="28" y="36" class="t h b">Статус</text><rect x="24" y="58" width="282" height="42" rx="8" fill="#f8f3e8" stroke="#d8d0bf"/><text x="68" y="85" class="t b" font-size="18">Возможно при условиях</text>
    <rect y="138" width="330" height="205" rx="16" fill="#fbfaf7" stroke="#ded8ca"/><text x="28" y="174" class="t h b">Проверка параметров</text>
    <text x="34" y="214" class="m s">Застройка: 180 м² / макс. 480 м²</text><text x="280" y="214" class="ok b s">✓</text><text x="54" y="234" class="ok sm">проходит</text>
    <text x="34" y="268" class="m s">Озеленение: 260 м² / минимум 240 м²</text><text x="280" y="268" class="ok b s">✓</text><text x="54" y="288" class="ok sm">проходит</text>
    <text x="34" y="322" class="m s">Парковка: 6 м/м / минимум 4 м/м</text><text x="280" y="322" class="ok b s">✓</text>
    <rect y="366" width="330" height="190" rx="16" fill="#fbfaf7" stroke="#ded8ca"/><text x="28" y="402" class="t h b">Источники</text>
    <text x="34" y="436" class="m s">ГПЗУ — отступы, красные линии</text><text x="34" y="466" class="m s">ПЗЗ — регламент, зона</text><text x="34" y="496" class="m s">ЕГРН — площадь, ВРИ</text><text x="34" y="526" class="m s">ЗОУИТ — ограничения</text>
    <rect y="580" width="330" height="58" rx="10" fill="#24251f"/><text x="72" y="616" fill="#fffdf8" font-family="Inter,Arial" font-size="17" font-weight="800">layout_json → SVG-схема</text>
  </g>

  <text x="78" y="808" class="m s">Цель: схема не должна быть «картинкой из головы». Она собирается из документов и показывает только подтверждённые или условные элементы.</text>
  <text x="78" y="836" class="m s">Когда данных недостаточно — схема обязана помечать условные зоны и список недостающих документов.</text>
</svg>