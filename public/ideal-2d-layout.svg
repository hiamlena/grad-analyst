<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900">
  <defs>
    <pattern id="grid" width="22" height="22" patternUnits="userSpaceOnUse"><path d="M22 0H0V22" fill="none" stroke="#eee8dc" stroke-width="1"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#171916" flood-opacity=".12"/></filter>
    <style>
      .t{font-family:Inter,Arial,sans-serif;fill:#171916}.m{font-family:Inter,Arial,sans-serif;fill:#667064}.b{font-weight:800}.s{font-size:14px}.sm{font-size:12px}.h{font-size:26px}.xl{font-size:34px;font-weight:900}.chip{fill:#fffdf8;stroke:#ded8ca}.gold{fill:#b89b5e}.ok{fill:#4f7d3a}.line{stroke:#ded8ca}.dash{stroke:#b89b5e;stroke-width:2;stroke-dasharray:10 8;fill:none}.red{stroke:#b65a3c;stroke-width:3}.thin{stroke:#667064;stroke-width:1}.caption{font-size:13px;fill:#667064}.label{font-size:13px;font-weight:800;letter-spacing:.06em}.white{fill:#fffdf8}.road{fill:#c8c5bb}.road2{fill:#b7b4ab}
    </style>
  </defs>
  <rect width="1440" height="900" fill="#eee9df"/>
  <rect x="34" y="28" width="1372" height="844" rx="34" fill="#fffdf8" stroke="#ded8ca" filter="url(#shadow)"/>

  <text x="78" y="82" class="t" font-size="34" font-weight="900">Идеальный 2D-макет размещения</text>
  <text x="80" y="116" class="m" font-size="16">Целевой вид для ГрадоАналитика: участок, ограничения, объект, подъезд, парковка и источники</text>

  <g transform="translate(78 150)">
    <rect class="chip" width="300" height="58" rx="12"/><text x="58" y="22" class="m s">Кадастровый номер</text><text x="58" y="44" class="t b" font-size="17">23:00:0000000:000</text><path d="M22 18h20v26H22zM28 23h8M28 30h8M28 37h8" fill="none" stroke="#b89b5e" stroke-width="2"/>
  </g>
  <g transform="translate(402 150)"><rect class="chip" width="235" height="58" rx="12"/><text x="58" y="22" class="m s">Площадь</text><text x="58" y="44" class="t b" font-size="17">1 200 м²</text><rect x="24" y="20" width="24" height="24" fill="none" stroke="#b89b5e" stroke-width="2" stroke-dasharray="5 4"/></g>
  <g transform="translate(660 150)"><rect class="chip" width="340" height="58" rx="12"/><text x="58" y="22" class="m s">Статус</text><text x="58" y="44" class="t b" font-size="17">возможно при условиях</text><path d="M34 18l16 7v12c0 9-7 15-16 19-9-4-16-10-16-19V25z" fill="none" stroke="#b89b5e" stroke-width="2"/></g>
  <g transform="translate(1024 150)"><rect class="chip" width="320" height="58" rx="12"/><text x="64" y="22" class="m s">Уверенность</text><text x="64" y="44" class="t b" font-size="17">средняя</text><path d="M24 42V31M36 42V23M48 42V15" stroke="#b89b5e" stroke-width="4" stroke-linecap="round"/></g>

  <rect x="78" y="236" width="905" height="520" rx="18" fill="#fbfaf7" stroke="#ded8ca"/>
  <text x="110" y="276" class="t h b">Схема размещения</text>
  <text x="110" y="300" class="m s">Масштаб 1:500 · схема сформирована из layout_json после анализа документов</text>

  <g transform="translate(110 338)">
